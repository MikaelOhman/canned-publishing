<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canned Publishing</title>
<meta name="description" content="Multilingual news – filter and search by tags.">
<link rel="stylesheet" href="app.css">
</head>
<body>
<header>
  <div class="wrap">
    <div class="head-top">
      <div class="brand">Canned Publishing<small id="ui-sub">Multilingual news</small></div>
      <div class="search">
        <label class="vh" for="sok" id="lbl-search">Search</label>
        <input id="sok" type="search" autocomplete="off">
      </div>
      <div class="langpick" title="Language">
        <span class="globe" aria-hidden="true">🌐</span>
        <select id="lang" aria-label="Language / Språk"></select>
      </div>
      <details class="settings" id="settings">
        <summary id="lbl-settings" title="Display" aria-label="Display settings">⚙</summary>
        <div class="panel">
          <div class="ctrl"><label for="tema" id="lbl-tema">Theme</label><select id="tema"></select></div>
          <div class="ctrl"><label for="text" id="lbl-text">Text size</label><select id="text"></select></div>
          <div class="ctrl"><label for="font" id="lbl-font">Font</label><select id="font"></select></div>
        </div>
      </details>
    </div>
  </div>
</header>

<main id="main" class="wrap" role="main">
  <div class="typefilter" id="typefilter" role="group" aria-label="Type"></div>
  <p class="searchhelp" id="searchhelp"></p>
  <div class="meta-row"><span id="count"></span></div>
  <section class="list" id="list" aria-label="News" aria-live="polite"></section>
  <article class="article hidden" id="article" tabindex="-1"></article>
</main>

<script src="app.js"></script>
</body>
</html>
