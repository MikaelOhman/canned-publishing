<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canned Publishing</title>
<meta name="description" content="Multilingual news – filter and search by your life situation.">
<link rel="alternate" type="application/rss+xml" title="RSS" href="feed.sv.xml" id="rss-alt">
<link rel="stylesheet" href="app.css">
</head>
<body>
<header>
  <div class="wrap">
    <div class="head-top">
      <div class="brand">Canned Publishing<small id="ui-sub">Multilingual news</small></div>
      <div class="search">
        <label class="vh" for="sok" id="lbl-search">Search</label>
        <input id="sok" type="search" autocomplete="off">
      </div>
      <div class="langpick" title="Language">
        <span class="globe" aria-hidden="true">🌐</span>
        <select id="lang" aria-label="Language / Språk"></select>
      </div>
      <details class="settings" id="settings">
        <summary id="lbl-settings" title="Display" aria-label="Display settings">⚙</summary>
        <div class="panel">
          <div class="ctrl"><label for="tema" id="lbl-tema">Theme</label><select id="tema"></select></div>
          <div class="ctrl"><label for="text" id="lbl-text">Text size</label><select id="text"></select></div>
          <div class="ctrl"><label for="font" id="lbl-font">Font</label><select id="font"></select></div>
        </div>
      </details>
    </div>
  </div>
</header>

<div class="wrap layout" id="layout">
  <button class="filter-toggle" id="filter-toggle" aria-expanded="false" aria-controls="sidebar"></button>
  <div class="backdrop hidden" id="backdrop"></div>

  <aside class="sidebar" id="sidebar" aria-label="Filter">
    <div class="side-head">
      <h2 id="side-title">Filter</h2>
      <button class="side-close" id="side-close" aria-label="Close">×</button>
    </div>
    <input class="filter-sok" id="filter-sok" type="search" autocomplete="off">
    <div class="facets" id="facets"></div>
    <div class="side-foot">
      <button class="side-clear" id="side-clear"></button>
      <button class="side-share" id="side-share" aria-expanded="false"></button>
    </div>
    <div class="share-box hidden" id="share-box"></div>
    <button class="side-apply" id="side-apply"></button>
  </aside>

  <main class="content" id="content" role="main">
    <div class="meta-row"><span id="count"></span></div>
    <section class="list" id="list" aria-label="News" aria-live="polite"></section>
    <article class="article hidden" id="article" tabindex="-1"></article>
    <section class="about hidden" id="about" tabindex="-1"></section>
  </main>
</div>

<footer class="wrap site-foot">
  <button class="lnk" id="omlank"></button>
  <a class="lnk" id="rsslank" href="feed.sv.xml">RSS</a>
  <span class="foot-ai" id="foot-ai"></span>
</footer>

<script src="app.js"></script>
</body>
</html>
