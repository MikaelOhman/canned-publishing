<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <g fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- newspaper -->
    <g transform="translate(28,40) rotate(-8)">
      <rect x="0" y="0" width="46" height="34" rx="3"/>
      <line x1="6" y1="8" x2="28" y2="8"/><line x1="6" y1="15" x2="40" y2="15"/>
      <line x1="6" y1="22" x2="40" y2="22"/><line x1="6" y1="28" x2="26" y2="28"/>
    </g>
    <!-- camera -->
    <g transform="translate(250,30) rotate(7)">
      <rect x="0" y="6" width="44" height="30" rx="4"/>
      <circle cx="22" cy="21" r="9"/><path d="M12 6 l4 -5 h12 l4 5"/>
    </g>
    <!-- globe -->
    <g transform="translate(150,120)">
      <circle cx="18" cy="18" r="18"/>
      <ellipse cx="18" cy="18" rx="8" ry="18"/><line x1="0" y1="18" x2="36" y2="18"/>
      <path d="M4 9 h28 M4 27 h28"/>
    </g>
    <!-- microphone -->
    <g transform="translate(300,150) rotate(-6)">
      <rect x="8" y="0" width="16" height="30" rx="8"/>
      <path d="M2 24 a14 14 0 0 0 28 0"/><line x1="16" y1="38" x2="16" y2="44"/>
    </g>
    <!-- rss -->
    <g transform="translate(40,170)">
      <path d="M2 30 a28 28 0 0 1 28 28"/><path d="M2 16 a42 42 0 0 1 42 42"/>
      <circle cx="5" cy="55" r="3"/>
    </g>
    <!-- speech bubble -->
    <g transform="translate(120,250) rotate(6)">
      <path d="M0 6 a6 6 0 0 1 6 -6 h34 a6 6 0 0 1 6 6 v20 a6 6 0 0 1 -6 6 h-22 l-12 10 v-10 h0 a6 6 0 0 1 -6 -6 z"/>
    </g>
    <!-- magnifier -->
    <g transform="translate(270,255)">
      <circle cx="14" cy="14" r="13"/><line x1="24" y1="24" x2="36" y2="36"/>
    </g>
    <!-- broadcast tower -->
    <g transform="translate(210,300)">
      <line x1="14" y1="6" x2="14" y2="40"/>
      <path d="M6 2 a16 16 0 0 0 0 22 M22 2 a16 16 0 0 1 0 22"/><circle cx="14" cy="13" r="3"/>
    </g>
    <!-- document -->
    <g transform="translate(20,290)">
      <path d="M0 0 h22 l10 10 v26 h-32 z"/><path d="M22 0 v10 h10"/>
      <line x1="6" y1="18" x2="24" y2="18"/><line x1="6" y1="25" x2="24" y2="25"/>
    </g>
  </g>
</svg>
